services:
  stt-service:
    image: faster-whisper-stt-service-api:4.0.0
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1001}
        GID: ${GID:-1001}

    container_name: faster_whisper_stt_service

    env_file:
      - .env

    ports:
      - "${STT_SERVICE_PORT_HOST:-8088}:${STT_SERVICE_PORT_CONTAINER:-8001}"

    volumes:
      - "${STT_AUDIO_INBOX_PATH:?Error: STT_AUDIO_INBOX_PATH must be set in .env}:/stt_app_data/audio_inbox"
      - "${STT_MODEL_CACHE_PATH:?Error: STT_MODEL_CACHE_PATH must be set in .env}:/stt_app_data/model_cache"

    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - CLEANUP_AUDIO=${CLEANUP_AUDIO:-True}
      - PORT=${STT_SERVICE_PORT_CONTAINER:-8001}

    # GPU support (requires NVIDIA Container Toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${STT_SERVICE_PORT_CONTAINER:-8001}/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s